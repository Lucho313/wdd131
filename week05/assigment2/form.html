<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Product review form where users can submit ratings and feedback about products.">
  <meta name="author" content="Luis Villegas">
  <title>Product Review</title>

  <link rel="stylesheet" href="css/styles.css">
  <script defer src="js/script.js"></script>
</head>

<body>

<header>
  <h1>Product Review</h1>
</header>

<main>
  <form method="get" action="review.html">

    <!-- PRODUCT -->
    <label for="product">Product Name</label>
    <select id="product" name="product" required>
      <option value="" disabled selected>Select a Product ...</option>
    </select>

    <!-- RATING -->
    <p>Overall Rating</p>

    <div class="rating">
      <label for="r1"><input type="radio" id="r1" name="rating" value="1" required> ☆</label>
      <label for="r2"><input type="radio" id="r2" name="rating" value="2" required> ☆☆</label>
      <label for="r3"><input type="radio" id="r3" name="rating" value="3" required> ☆☆☆</label>
      <label for="r4"><input type="radio" id="r4" name="rating" value="4" required> ☆☆☆☆</label>
      <label for="r5"><input type="radio" id="r5" name="rating" value="5" required> ☆☆☆☆☆</label>
    </div>

    <!-- DATE -->
    <label for="date">Date of Installation</label>
    <input type="date" id="date" name="date" required>

    <!-- FEATURES -->
    <p>Useful Features</p>

    <label for="f1"><input type="checkbox" id="f1" name="features" value="durable"> Durable</label>
    <label for="f2"><input type="checkbox" id="f2" name="features" value="easy"> Easy to Use</label>
    <label for="f3"><input type="checkbox" id="f3" name="features" value="design"> Good Design</label>
    <label for="f4"><input type="checkbox" id="f4" name="features" value="price"> Good Price</label>

    <!-- REVIEW -->
    <label for="review">Written Review (Optional)</label>
    <textarea id="review" name="review"></textarea>

    <!-- NAME -->
    <label for="username">Your Name (Optional)</label>
    <input type="text" id="username" name="username">

    <!-- SUBMIT -->
    <input type="submit" value="Post Review">

  </form>
</main>

<footer>
  <p>&copy; <span id="year"></span></p>
  <p>Last Modified: <span id="lastModified"></span></p>
</footer>

</body>
</html>
