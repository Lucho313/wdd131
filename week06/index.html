<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BMI calculator with history and health recommendations">
  <meta name="author" content="Luis Villegas">
  <title>Health Calculator Pro</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <h1>Health Calculator Pro</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About BMI</a>
    <a href="history.html">History</a>
  </nav>
</header>

<main>
  <section class="card">
    <h2>Calculate Your BMI</h2>

    <form id="formIMC">
      <label for="peso">Weight (kg)</label>
      <input type="number" id="peso" required>

      <label for="altura">Height (m)</label>
      <input type="number" step="0.01" id="altura" required>

      <button type="submit">Calculate</button>
    </form>

    <p id="resultado"></p>
  </section>

  <section class="card">
    <h2>What is BMI?</h2>
    <p>BMI is a measurement that relates your weight to your height to evaluate your body condition.</p>
    <img src="images/health.jpg" loading="lazy" alt="healthy person exercising">
  </section>
</main>

<footer>
  <p>WDD131 Project - 2026</p>
  <p>&copy; <span id="year"></span> Luis Villegas</p>
  <p>Last Modified: <span id="lastModified"></span></p>

</footer>

<script src="js/script.js"></script>
</body>
</html>
