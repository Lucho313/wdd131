<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Temple album with filtering options by age and size.">
  <meta name="author" content="Luis Villegas">

  <title>Temple Album</title>

  <link rel="stylesheet" href="filtered-temples.css">
  <script defer src="filtered-temples.js"></script>
</head>

<body>
  <header>
    <h1>Temple Album</h1>

    <nav aria-label="Temple Filters">
        <a href="#" data-filter="all" class="active">Home</a>
        <a href="#" data-filter="old">Old</a>
        <a href="#" data-filter="new">New</a>
        <a href="#" data-filter="large">Large</a>
        <a href="#" data-filter="small">Small</a>
    </nav>
  </header>

  <main>
    <section id="temple-container" aria-live="polite"></section>
  </main>

  <footer>
    <p>&copy; <span id="year"></span></p>
    <p>Last Modified: <span id="lastModified"></span></p>
  </footer>
</body>
</html>
